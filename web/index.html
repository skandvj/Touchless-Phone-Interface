<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Clap Up Down</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-live="polite">
        <header class="game-header">
          <div>
            <p class="eyebrow">Bakeoff prototype</p>
            <h1>Clap Up Down</h1>
          </div>
          <div class="trial-pill" id="trialPill">Ready</div>
        </header>

        <section class="ready-screen" id="readyScreen">
          <div class="ready-mark">4</div>
          <h2>Ready?</h2>
          <p>Clap to move through the blocks, then move the phone up or down to select.</p>
          <button class="primary-button" id="startButton" type="button">Start</button>
        </section>

        <section class="trial-screen is-hidden" id="trialScreen">
          <div class="target-row">
            <div>
              <p class="muted-label">Navigate to block</p>
              <div class="target-number" id="targetNumber">1</div>
            </div>
            <div>
              <p class="muted-label">Action</p>
              <div class="action-word" id="actionWord">Phone Up</div>
            </div>
          </div>

          <div class="options-grid" id="optionsGrid" aria-label="Selectable blocks"></div>
          <p class="current-label" id="currentLabel">Current: 1</p>
        </section>

        <section class="complete-screen is-hidden" id="completeScreen">
          <p class="eyebrow">Complete</p>
          <h2 id="avgTime">0.00s</h2>
          <p>per trial</p>
          <div class="result-line" id="totalTime">Total time: 0.0s</div>
          <button class="secondary-button" id="againButton" type="button">Run again</button>
        </section>
      </section>

      <aside class="control-panel">
        <div class="status-group">
          <div>
            <p class="muted-label">Mic</p>
            <strong id="micStatus">Waiting</strong>
          </div>
          <div class="meter" aria-label="Microphone level">
            <span id="micMeter"></span>
          </div>
        </div>

        <div class="status-group">
          <div>
            <p class="muted-label">Motion Z</p>
            <strong id="motionStatus">Waiting</strong>
          </div>
          <label class="switch-row">
            <input id="invertMotion" type="checkbox" />
            <span>Invert</span>
          </label>
        </div>

        <label class="slider-row">
          <span>Clap sensitivity</span>
          <input id="sensitivity" type="range" min="30" max="95" value="68" />
        </label>

        <div class="test-row" aria-label="Desktop test controls">
          <button class="secondary-button" id="testClap" type="button">Clap</button>
          <button class="secondary-button" id="testUp" type="button">Up</button>
          <button class="secondary-button" id="testDown" type="button">Down</button>
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
